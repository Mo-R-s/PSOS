<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>PSOS Aether</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="icon" href="icons/favicon-32.png">
<meta name="theme-color" content="#0a0b0f">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@500;600;700&display=swap');
  :root {
    --void: #0a0b0f;
    --panel: #1a1d24;
    --glass: rgba(26,29,36,0.92);
    --accent: #d4af37;
    --good: #4ade80;
    --warn: #f87171;
    --ink: #e8e6df;
  }
  * { box-sizing: border-box; }
  html, body { margin:0; height:100%; background:var(--void); color:var(--ink); font-family:'Inter',sans-serif; }
  h1, h2, h3 { font-family:'Playfair Display',serif; font-weight:600; letter-spacing:-0.02em; }
  #app { max-width:660px; margin:0 auto; padding:24px 20px 140px; min-height:100%; }
  .glass { background:var(--glass); backdrop-filter:blur(20px); border:1px solid rgba(212,175,55,0.18); border-radius:16px; }
  .card.glass { margin-bottom:24px; padding:24px; }
  .score-big { font-size:68px; background:linear-gradient(180deg,#d4af37,#b38b2e); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
  .btn { background:linear-gradient(145deg,#d4af37,#b38b2e); color:#0a0b0f; font-weight:700; border:none; border-radius:12px; padding:14px 24px; cursor:pointer; }
  .tabbar { position:fixed; bottom:0; left:0; right:0; background:rgba(17,19,23,0.95); backdrop-filter:blur(24px); border-top:1px solid rgba(212,175,55,0.15); display:flex; padding:12px 8px calc(12px + env(safe-area-inset-bottom)); z-index:100; }
  .tab-btn { flex:1; padding:8px; color:#a3a8b0; text-align:center; }
  .tab-btn.active { color:var(--accent); }
</style>
</head>
<body>
<div id="app">
  <!-- Dashboard -->
  <div class="screen active" id="screen-dashboard">
    <header class="hero glass">
      <h1>PSOS Aether</h1>
      <p>Strategic Executive OS</p>
    </header>
    <div class="card glass">
      <p>The new Money tab is now live with debts, revenues, snowball payoff, recurring items, and projections.</p>
    </div>
  </div>

  <!-- Money Screen -->
  <div class="screen" id="screen-money">
    <header class="hero glass">
      <div class="eyebrow">FINANCIAL COMMAND CENTER</div>
      <h1>Liquidity Engine</h1>
    </header>

    <div class="card glass">
      <h3>Net Position</h3>
      <canvas id="financeChart" height="170"></canvas>
      <div id="netPosition" class="score-big" style="text-align:center;margin-top:12px;"></div>
    </div>

    <div class="card glass">
      <h3>Active Debts</h3>
      <div id="debtList"></div>
      <button class="btn" onclick="addDebt()">+ New Debt</button>
      <button class="btn ghost" onclick="runSnowballMethod()">Run Snowball</button>
    </div>

    <div class="card glass">
      <h3>Revenues</h3>
      <div id="revenueList"></div>
      <button class="btn ghost" onclick="addRevenue(true)">+ Recurring Revenue</button>
      <button class="btn ghost" onclick="addRevenue(false)">+ One-time</button>
      <button class="btn ghost" onclick="importCSV()">Import CSV</button>
    </div>

    <div class="card glass">
      <h3>90-Day Projection</h3>
      <div id="projectionResult"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast" style="position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--accent);color:#0a0b0f;padding:10px 20px;border-radius:20px;opacity:0;transition:opacity .3s;z-index:1000;"></div>

<div class="tabbar">
  <button class="tab-btn active" onclick="showScreen('dashboard')">Dashboard</button>
  <button class="tab-btn" onclick="showScreen('money')">Money</button>
</div>

<script>
/* PSOS Aether - Final Version */
let STATE = {
  stocks: { liquidity: 68 },
  financials: { revenues: [], debts: [] }
};

function saveState() {
  localStorage.setItem('psos_aether_state', JSON.stringify(STATE));
}

function loadState() {
  const saved = localStorage.getItem('psos_aether_state');
  if (saved) STATE = JSON.parse(saved);
}

let financeChart = null;

function renderMoney() {
  const unpaidDebt = STATE.financials.debts.filter(d => !d.paid).reduce((s,d) => s + d.amount, 0);
  const totalRev = STATE.financials.revenues.reduce((s,r) => s + r.amount, 0);
  const net = totalRev - unpaidDebt;

  document.getElementById('netPosition').textContent = net.toLocaleString('en-US') + " UGX";

  const ctx = document.getElementById('financeChart').getContext('2d');
  if (financeChart) financeChart.destroy();
  financeChart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: ['Debts', 'Revenues', 'Net'],
      datasets: [{ data: [unpaidDebt, totalRev, net], backgroundColor: ['#f87171', '#4ade80', '#d4af37'] }]
    },
    options: { responsive: true }
  });

  document.getElementById('projectionResult').innerHTML = `90-Day Projected Net: <strong>${(totalRev * 3 - unpaidDebt * 1.12).toLocaleString()} UGX</strong>`;
}

function addDebt() {
  const amt = parseFloat(prompt("Debt amount (UGX)"));
  if (amt) {
    STATE.financials.debts.push({id: Date.now(), amount: amt, paid: false});
    saveState();
    renderMoney();
  }
}

function addRevenue(isRecurring) {
  const amt = parseFloat(prompt("Revenue amount (UGX)"));
  if (amt) {
    STATE.financials.revenues.push({amount: amt, recurring: isRecurring});
    saveState();
    renderMoney();
  }
}

function runSnowballMethod() {
  if (confirm("Apply Snowball method?")) {
    STATE.financials.debts.sort((a,b) => a.amount - b.amount);
    saveState();
    renderMoney();
    showToast("Snowball applied");
  }
}

function importCSV() {
  alert("CSV Import ready. Prepare file with columns: type,date,amount");
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.opacity = 1;
  setTimeout(() => t.style.opacity = 0, 2500);
}

function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
  if (name === 'money') renderMoney();
}

// Initialize
loadState();
showScreen('dashboard');
</script>
</body>
</html>
