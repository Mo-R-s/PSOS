document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';

    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    // Nested page bundles (iframe targets). Each ships ONCE, in the ROOT
    // document's manifest; frame srcs carry an about:blank#<uuid> marker
    // instead of a substitutable uuid. Every document mints the blobs for
    // its OWN frames — from local text at the root, or text obtained from
    // its DIRECT parent over the relay protocol below — so each frame
    // navigation stays same-origin with its initiator and a deduped page
    // loads at any depth on any host, including a file:// download's
    // opaque origins (where a blob minted by one document cannot be
    // navigated to by another).

    const pageOrder = pageOrderEl ? JSON.parse(pageOrderEl.textContent) : [];
    const pageSet = new Set(pageOrder);
    const pageTexts = {};

    // ── Nested-page text protocol (parent-chain relay) ──
    // Page bundles ship once, in the ROOT document's manifest. Every
    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends
    // upward at all. That last rule is load-bearing: the artifact host's
    // frame-ancestors allows claude.ai (and friends) to frame an
    // artifact, so window.top can be a FOREIGN document — a top-addressed
    // protocol would hand page uuids to that ancestor and accept forged
    // "page text" from it, minting attacker HTML as an artifact-origin
    // blob document. The chain never touches the ancestor: requests stop
    // at the root, replies are origin-addressed per hop (never '*' when
    // an origin exists), and both directions are origin-gated (on https
    // a foreign sender's origin can never equal this document's; in
    // opaque contexts — file:// — everything serializes as 'null', where
    // an embedded EXTERNAL frame still fails the gate by carrying its
    // own real origin, and a sandboxed child of such a frame is excluded
    // by the own-child-frames check plus uuid unguessability). Shape is
    // deny-by-default: one request form, one reply form, no error
    // replies.
    // window.origin is the SERIALIZED SECURITY origin ('null' in opaque
    // contexts such as a sandboxed preview iframe) — location.origin is
    // computed from the URL and stays 'https://…' even when the document
    // is sandboxed, which would misgate every opaque chain.
    const OWN_TARGET = /^https?:[/][/]/.test(window.origin || '')
      ? window.origin
      : '*';
    function trustedOrigin(e) {
      if (e.origin === window.origin) return true; // https chains; opaque==opaque
      // file:// trees: Chrome serializes the file document's origin as
      // 'file://' while the blob: documents it mints serialize as 'null',
      // so the two legitimate shapes can never string-match — accept the
      // pair in both directions. https origins never serialize as either,
      // and sender identity (own child frame / direct parent) is checked
      // separately.
      return (
        (e.origin === 'null' &&
          (window.origin === 'file://' ||
            window.location.protocol === 'file:')) ||
        (/^file:/.test(e.origin) && window.origin === 'null')
      );
    }
    // Non-empty only in the root document (nested bundles ship an empty
    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.
    const isPageRoot = pageOrder.length > 0;
    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down
    function mountPage(el, frag, text) {
      const pageBlob = new Blob([text], { type: 'text/html' });
      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }
    }
    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }
      }
      return out;
    }
    window.addEventListener('message', function (e) {
      const d = e.data;
      if (!d || typeof d !== 'object' || !e.source) return;
      // Origin gate first; the structural checks below (own-child-frames
      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;
        const uuid = d.__bundler_need;
        const text = pageTexts[uuid];
        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
          return;
        }
        if (isPageRoot || window.parent === window) return; // authoritative miss
        const waiting = pendingRelays[uuid];
        if (waiting) {
          if (waiting.indexOf(e.source) < 0) waiting.push(e.source);
          return;
        }
        // Never-answered uuids would otherwise accumulate forever under a
        // request spray; past the cap (far above any real page count) new
        // relays are dropped rather than remembered.
        if (Object.keys(pendingRelays).length >= 128) return;
        pendingRelays[uuid] = [e.source];
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      } else if (
        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'
      ) {
        // The shape test is load-bearing beyond tidiness: the solicited
        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent — the document
        // that minted this one.
        if (e.source !== window.parent || window.parent === window) return;
        if (!(d.__bundler_page in pendingFrames) && !(d.__bundler_page in pendingRelays)) return;
        deliverPage(d.__bundler_page, d.__bundler_text);
      }
    });

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (pageSet.has(uuid)) {
          pageTexts[uuid] = new TextDecoder().decode(finalBytes);
          return;
        }
        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    // Page uuids have no blob here — they ride inside about:blank#<uuid>
    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {
      if (pageSet.has(uuid)) continue;
      template = template.split(uuid).join(blobUrls[uuid]);
    }

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }
    }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}\n@keyframes breathe{0%,100%{box-shadow:0 0 0 0 rgba(217,174,62,.0)}50%{box-shadow:0 0 24px 0 rgba(217,174,62,.14)}}\n@keyframes nodepulse{0%,100%{opacity:.55}50%{opacity:1}}\n@keyframes spin{to{transform:rotate(360deg)}}\n::placeholder{color:#5d5a50}\n<\u002Fstyle>\n<\u002Fhelmet>\n<div style=\"max-width:430px;margin:0 auto;min-height:100vh;padding:18px 16px 110px;position:relative\">\n\n<sc-if value=\"{{onToday}}\" hint-placeholder-val=\"{{ true }}\">\n<div data-screen-label=\"Today\">\n  <header style=\"display:flex;justify-content:space-between;align-items:flex-start;gap:10px;padding:4px 0 16px\">\n    <div>\n      <div style=\"font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:#d9ae3e;font-weight:600\">PSOS · Chief of Staff<\u002Fdiv>\n      <h1 style=\"font-family:'Instrument Serif',serif;font-weight:400;font-size:30px;margin:6px 0 3px\">{{greeting}}<\u002Fh1>\n      <div style=\"font-size:12.5px;color:#8f8b7f\">{{dateMeta}}<\u002Fdiv>\n    <\u002Fdiv>\n    <button sc-camel-on-click=\"{{openSettings}}\" aria-label=\"Settings\" style=\"background:none;border:1px solid rgba(236,231,219,.14);color:#8f8b7f;border-radius:8px;width:36px;height:36px;font-size:15px;cursor:pointer;flex-shrink:0\">⚙<\u002Fbutton>\n  <\u002Fheader>\n\n  <div style=\"display:flex;align-items:center;gap:16px;background:#12141a;border:1px solid rgba(236,231,219,.08);border-radius:14px;padding:16px;margin-bottom:12px;animation:fadeup .3s ease both\">\n    <div style=\"position:relative;width:86px;height:86px;flex-shrink:0\">\n      <svg width=\"86\" height=\"86\" sc-camel-view-box=\"0 0 100 100\" style=\"display:block\">\n        <circle cx=\"50\" cy=\"50\" r=\"42\" fill=\"none\" stroke=\"rgba(236,231,219,.09)\" stroke-width=\"7\"><\u002Fcircle>\n        <circle cx=\"50\" cy=\"50\" r=\"42\" fill=\"none\" stroke=\"#d9ae3e\" stroke-width=\"7\" stroke-linecap=\"round\" stroke-dasharray=\"{{ringDash}}\" trans der:1px solid rgba(236,231,219,.16);color:#a8a396;font-size:13px;padding:10px 16px;border-radius:8px;cursor:pointer;font-family:'Instrument Sans'\">Not now<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <sc-if value=\"{{hasAlerts}}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"display:flex;flex-direction:column;gap:8px;margin-bottom:12px\">\n      <sc-for list=\"{{alerts}}\" as=\"a\" hint-placeholder-count=\"1\">\n        <div style=\"display:flex;gap:10px;align-items:flex-start;background:#12141a;border:1px solid rgba(236,231,219,.08);border-left:3px solid {{a.color}};border-radius:0 10px 10px 0;padding:11px 14px;font-size:13px;color:#a8a396;line-height:1.5\">{{a.text}}<\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <div style=\"background:#12141a;border:1px solid rgba(236,231,219,.08);border-radius:14px;padding:16px;margin-bottom:12px\">\n    <div style=\"display:flex;justify-content:space-between;align-items:baseline\">\n      <h3 style=\"font-family:'Instrument Serif',serif;font-weight:400;font-size:19px;margin:0\">The day ahead<\u002Fh3>\n      <span style=\"font-size:11px;color:#5d5a50\">{{planNote}}<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"margin-top:10px;display:flex;flex-direction:column\">\n      <sc-for list=\"{{timeline}}\" as=\"t\" hint-placeholder-count=\"3\">\n        <div style=\"display:grid;grid-template-columns:58px 10px 1fr;gap:10px;align-items:start;padding:9px 0\">\n          <div style=\"font-size:12px;color:#8f8b7f;font-variant-numeric:tabular-nums;padding-top:1px\">{{t.time}}<\u002Fdiv>\n          <div style=\"width:8px;height:8px;border-radius:50%;background:{{t.color}};margin-top:4px\"><\u002Fdiv>\n          <div>\n            <div style=\"font-size:14px\">{{t.title}}<\u002Fdiv>\n            <div style=\"font-size:11.5px;color:#5d5a50;margin-top:2px\">{{t.sub}}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"margin-bottom:12px\">\n    <div style=\"font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#5d5a50;margin:0 2px 8px\">Quick log<\u002Fdiv>\n    <div style=\"display:flex;gap:8px;overflow-x:auto;padding-bottom:6px;scrollbar-width:none\">\n      <sc-for list=\"{{quickEvents}}\" as=\"q\" hint-placeholder-count=\"4\">\n        <button sc-camel-on-click=\"{{q.onLog}}\" style=\"flex-shrink:0;background:#1a1d24;border:1px solid rgba(236,231,219,.1);color:#ece7db;border-radius:20px;padding:9px 15px;font-size:12.5px;cursor:pointer;font-family:'Instrument Sans';white-space:nowrap\">{{q.label}}<\u002Fbutton>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <sc-if value=\"{{hasRecent}}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"background:#12141a;border:1px solid rgba(236,231,219,.08);border-radius:14px;padding:14px 16px;margin-bottom:12px\">\n      <div style=\"font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#5d5a50;margin-bottom:6px\">Logged today<\u002Fdiv>\n      <sc-for list=\"{{recent}}\" as=\"r\" hint-placeholder-count=\"2\">\n        <div style=\"display:flex;justify-content:space-between;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid rgba(236,231,219,.06);font-size:12.5px;color:#a8a396\">\n          <span>{{r.label}}<\u002Fspan>\n          <button sc-camel-on-click=\"{{r.onUndo}}\" style=\"background:none;border:1px solid rgba(236,231,219,.12);color:#5d5a50;border-radius:6px;font-size:11px;padding:3px 9px;cursor:pointer;font-family:'Instrument Sans';flex-shrink:0\">Undo<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<sc-if value=\"{{onLoops}}\" hint-placeholder-val=\"{{ false }}\">\n<div data-screen-label=\"Loops\">\n  <header style=\"padding:4px 0 14px\">\n    <div style=\"font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:#d9ae3e;font-weight:600\">PSOS · System dynamics<\u002Fdiv>\n    <h1 style=\"font-family:'Instrument Serif',serif;font-weight:400;font-size:30px;margin:6px 0 3px\">The machine<\u002Fh1>\n    <div style=\"font-size:12.5px;color:#8f8b7f\">Your life as feedback loops. Node size = current level.<\u002Fdiv>\n  <\u002Fheader>\n  <div style=\"background:#12141a;border:1px solid rgba(236,231,219,.08);border-radius:14px;padding:8px 6px 2px;margin-bottom:8px\">{{loopMap}}<\u002Fdiv>\n  <div style=\"background:#12141a;border:1px solid rgba(236,231,219,.08);border-radius:14px;padding:14px 16px;margin-bottom:16px;font-size:13px;color:#a8a396;line-height:1.6\"><strong style=\"color:#ece7db\">Read:<\u002Fstrong> {{loopRead}}<\u002Fdiv>\n  <sc-for list=\"{{groups}}\" as=\"g\" hint-placeholder-count=\"3\">\n    <div style=\"background:#12141a;border:1px solid rgba(236,231,219,.08);border-radius:14px;padding:16px;margin-bottom:12px\">\n      <h3 style=\"font-family:'Instrument Serif',serif;font-weight:400;font-size:19px;margin:0 0 10px\">{{g.name}}<\u002Fh3>\n      <sc-for list=\"{{g.stocks}}\" as=\"s\" hint-placeholder-count=\"4\">\n        <div style=\"display:grid;grid-template-columns:1fr 88px 46px;gap:10px;align-items:center;padding:7px 0;border-bottom:1px solid rgba(236,231,219,.06);font-size:13px\">\n          <span style=\"color:#cfcabd\">{{s.label}}<\u002Fspan>\n          <div style=\"height:5px;border-radius:3px;background:rgba(236,231,219,.09);overflow:hidden\"><div style=\"height:100%;border-radius:3px;background:{{s.barColor}};width:{{s.pct}}%;transition:width .5s ease\"><\u002Fdiv><\u002Fdiv>\n          <span style=\"text-align:right;font-size:12px;font-weight:600;color:{{s.trendColor}};font-variant-numeric:tabular-nums\">{{s.trendTxt}}<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fsc-for>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<sc-if value=\"{{onMoney}}\" hint-placeholder-val=\"{{ false }}\">\n<div data-screen-label=\"Money\">\n  <header style=\"padding:4px 0 14px\">\n    <div style=\"font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:#d9ae3e;font-weight:600\">PSOS · Treasury<\u002Fdiv>\n    <h1 style=\"font-family:'Instrument Serif',serif;font-weight:400;font-size:30px;margin:6px 0 3px\">Where money goes<\u002Fh1>\n    <div style=\"font-size:12.5px;color:#8f8b7f\">The system decides allocation. You decide exceptions.<\u002Fdiv>\n  <\u002Fheader>\n\n  <div style=\"background:#12141a;border:1px solid rgba(236,231,219,.08);border-radius:14px;padding:16px;margin-bottom:12px\">\n    <div style=\"display:flex;justify-content:space-between;gap:12px\">\n      <div>\n        <div style=\"font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#5d5a50\">Cash on hand<\u002Fdiv>\n        <div style=\"font-family:'Instrument Serif',serif;font-size:32px;margin-top:4px;color:#d9ae3e\">{{cashText}}<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"text-align:right\">\n        <div style=\"font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#5d5a50\">Runway<\u002Fdiv>\n        <div style=\"font-family:'Instrument Serif',serif;font-size:32px;margin-top:4px\">{{runwayText}}<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex;gap:8px;margin-top:14px\">\n      <input type=\"number\" value=\"{{cashEdit}}\" sc-camel-on-change=\"{{onCashEdit}}\" placeholder=\"Update cash\" style=\"flex:1;background:#1a1d24;border:1px solid rgba(236,231,219,.12);color:#ece7db;padding:10px 12px;border-radius:8px;font-size:13px;min-width:0\">\n      <input type=\"number\" value=\"{{budgetEdit}}\" sc-camel-on-change=\"{{onBudgetEdit}}\" placeholder=\"Monthly budget\" style=\"flex:1;background:#1a1d24;border:1px solid rgba(236,231,219,.12);color:#ece7db;padding:10px 12px;border-radius:8px;font-size:13px;min-width:0\">\n      <button sc-camel-on-click=\"{{saveMoneyBasics}}\" style=\"background:#d9ae3e;color:#0b0c10;border:none;font-weight:700;font-size:12.5px;padding:10px 14px;border-radius:8px;cursor:pointer;font-family:'Instrument Sans'\">Set<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"background:#12141a;border:1px solid rgba(236,231,219,.08);border-radius:14px;padding:16px;margin-bottom:12px\">\n    <div style=\"display:flex;justify-content:space-between;align-items:baseline\">\n      <h3 style=\"font-family:'Instrument Serif',serif;font-weight:400;font-size:19px;margin:0\">This month's envelopes<\u002Fh3>\n      <span style=\"font-size:11px;color:#5d5a50\">{{envMonthNote}}<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"margin-top:8px\">\n      <sc-for list=\"{{envelopes}}\" as=\"e\" hint-placeholder-count=\"5\">\n        <div style=\"padding:10px 0;border-bottom:1px solid rgba(236,231,219,.06)\">\n          <div style=\"display:flex;justify-content:space-between;font-size:13.5px\"><span>{{e.label}}<\u002Fspan><span style=\"color:#8f8b7f;font-variant-numeric:tabular-nums\">{{e.amtText}}<\u002Fspan><\u002Fdiv>\n          <div style=\"height:5px;border-radius:3px;background:rgba(236,231,219,.09);overflow:hidden;margin-top:7px\"><div style=\"height:100%;background:{{e.barColor}};width:{{e.barW}}%;transition:width .4s\"><\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex;justify-content:space-between;align-items:center;margin-top:6px\">\n            <span style=\"font-size:11px;color:#5d5a50\">{{e.spentText}}<\u002Fspan>\n            <button sc-camel-on-click=\"{{e.onOpen}}\" style=\"background:none;border:none;color:#d9ae3e;font-size:11.5px;cursor:pointer;font-family:'Instrument Sans';padding:2px\">+ log spend<\u002Fbutton>\n          <\u002Fdiv>\n          <sc-if value=\"{{e.open}}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"display:flex;gap:8px;margin-top:8px\">\n              <input type=\"number\" value=\"{{spendAmt}}\" sc-camel-on-change=\"{{onSpendAmt}}\" placeholder=\"Amount\" style=\"flex:1;background:#1a1d24;border:1px solid rgba(236,231,219,.12);color:#ece7db;padding:9px 12px;border-radius:8px;font-size:13px;min-width:0\">\n              <button sc-camel-on-click=\"{{e.onSpend}}\" style=\"background:#d9ae3e;color:#0b0c10;border:none;font-weight:700;font-size:12px;padding:9px 14px;border-radius:8px;cursor:pointer;font-family:'Instrument Sans'\">Log<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"background:linear-gradient(160deg,#141a17,#12141a 70%);border:1px solid rgba(111,174,127,.3);border-radius:14px;padding:16px;margin-bottom:12px\">\n    <h3 style=\"font-family:'Instrument Serif',serif;font-weight:400;font-size:19px;margin:0\">Windfall allocator<\u002Fh3>\n    <div style=\"font-size:12.5px;color:#8f8b7f;margin-top:4px;line-height:1.5\">A venture paid out? PSOS splits it against your weakest strategic gaps.<\u002Fdiv>\n    <div style=\"display:flex;gap:8px;margin-top:12px\">\n      <input type=\"number\" value=\"{{windAmt}}\" sc-camel-on-change=\"{{onWindAmt}}\" placeholder=\"Amount received\" style=\"flex:1.4;background:#1a1d24;border:1px solid rgba(236,231,219,.12);color:#ece7db;padding:10px 12px;border-radius:8px;font-size:13px;min-width:0\">\n      <sc-raw-select value=\"{{windSrc}}\" sc-camel-on-change=\"{{onWindSrc}}\" style=\"flex:1;background:#1a1d24;border:1px solid rgba(236,231,219,.12);color:#ece7db;padding:10px 8px;border-radius:8px;font-size:12.5px;min-width:0\">\n        <option value=\"soa\">SOA<\u002Foption><option value=\"legal\">Legal practice<\u002Foption><option value=\"nga\">NGA<\u002Foption><option value=\"istartapp\">iStartApp<\u002Foption><option value=\"other\">Other<\u002Foption>\n      <\u002Fsc-raw-select>\n    <\u002Fdiv>\n    <button sc-camel-on-click=\"{{onWind}}\" style=\"margin-top:10px;width:100%;background:#6fae7f;color:#0b0c10;border:none;font-weight:700;font-size:13px;padding:11px;border-radius:8px;cursor:pointer;font-family:'Instrument Sans'\">Allocate it<\u002Fbutton>\n    <sc-if value=\"{{hasWind}}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"margin-top:12px\">\n        <sc-for list=\"{{windResult}}\" as=\"w\" hint-placeholder-count=\"4\">\n          <div style=\"display:grid;grid-template-columns:1fr auto auto;gap:10px;padding:7px 0;border-bottom:1px solid rgba(236,231,219,.06);font-size:13px;align-items:baseline\">\n            <span>{{w.label}}<\u002Fspan><span style=\"color:#5d5a50;font-size:11.5px\">{{w.pct}}<\u002Fspan><span style=\"color:#6fae7f;font-variant-numeric:tabular-nums;font-weight:600\">{{w.amtText}}<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n        <div style=\"font-size:12.5px;color:#a8a396;line-height:1.6;margin-top:10px;font-style:italic\">{{windNote}}<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n  <\u002Fdiv>\n\n  <sc-if value=\"{{hasLedger}}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"background:#12141a;border:1px solid rgba(236,231,219,.08);border-radius:14px;padding:14px 16px;margin-bottom:12px\">\n      <div style=\"font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#5d5a50;margin-bottom:4px\">Ledger<\u002Fdiv>\n      <sc-for list=\"{{ledger}}\" as=\"l\" hint-placeholder-count=\"3\">\n        <div style=\"display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid rgba(236,231,219,.06);font-size:12.5px;color:#a8a396\"><span>{{l.label}}<\u002Fspan><span style=\"color:{{l.color}};font-variant-numeric:tabular-nums\">{{l.amtText}}<\u002Fspan><\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<sc-if value=\"{{onBrief}}\" hint-placeholder-val=\"{{ false }}\">\n<div data-screen-label=\"Brief\">\n  <header style=\"padding:4px 0 14px;display:flex;justify-content:space-between;align-items:flex-start;gap:10px\">\n    <div>\n      <div style=\"font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:#d9ae3e;font-weight:600\">PSOS · The brief<\u002Fdiv>\n      <h1 style=\"font-family:'Instrument Serif',serif;font-weight:400;font-size:30px;margin:6px 0 3px\">Inbox &amp; diary<\u002Fh1>\n      <div style=\"font-size:12.5px;color:#8f8b7f\">{{bridgeStatusText}}<\u002Fdiv>\n    <\u002Fdiv>\n    <button sc-camel-on-click=\"{{onRefresh}}\" style=\"background:none;border:1px solid rgba(236,231,219,.14);color:#a8a396;border-radius:8px;padding:9px 13px;font-size:12px;cursor:pointer;font-family:'Instrument Sans';flex-shrink:0\">Refresh<\u002Fbutton>\n  <\u002Fheader>\n\n  <sc-if value=\"{{bridgeMissing}}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"background:linear-gradient(160deg,#1b1a14,#12141a);border:1px solid rgba(217,174,62,.35);border-radius:14px;padding:18px;margin-bottom:12px\">\n      <div style=\"font-family:'Instrument Serif',serif;font-size:20px\">Connect your Gmail &amp; Calendar<\u002Fdiv>\n      <div style=\"font-size:13px;color:#a8a396;line-height:1.6;margin:8px 0 12px\">Your bridge script already exists in your Google account. Two pastes and a test — the wizard walks you through it.<\u002Fdiv>\n      <button sc-camel-on-click=\"{{openSettings}}\" style=\"background:#d9ae3e;color:#0b0c10;border:none;font-weight:700;font-size:13px;padding:10px 18px;border-radius:8px;cursor:pointer;font-family:'Instrument Sans'\">Open the wizard<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <sc-if value=\"{{loadingInbox}}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"display:flex;align-items:center;gap:10px;background:#12141a;border:1px solid rgba(236,231,219,.08);border-radius:14px;padding:16px;margin-bottom:12px;font-size:13px;color:#8f8b7f\">\n      <div style=\"width:14px;height:14px;border:2px solid rgba(236,231,219,.15);border-top-color:#d9ae3e;border-radius:50%;animation:spin .8s linear infinite\"><\u002Fdiv>{{loadingText}}\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <sc-if value=\"{{hasEmails}}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"background:#12141a;border:1px solid rgba(236,231,219,.08);border-radius:14px;padding:6px 16px;margin-bottom:12px\">\n      <sc-for list=\"{{emails}}\" as=\"m\" hint-placeholder-count=\"4\">\n        <div style=\"padding:12px 0;border-bottom:1px solid rgba(236,231,219,.06)\">\n          <div style=\"display:flex;justify-content:space-between;gap:8px;align-items:center\">\n            <span style=\"display:inline-block;font-size:9.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:2px 8px;border-radius:4px;background:{{m.badgeBg}};color:{{m.badgeColor}}\">{{m.badge}}<\u002Fspan>\n            <span style=\"font-size:11px;color:#5d5a50\">{{m.when}}<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"font-size:14px;margin:6px 0 2px\">{{m.subject}}<\u002Fdiv>\n          <div style=\"font-size:11.5px;color:#5d5a50\">{{m.from}}<\u002Fdiv>\n          <div style=\"font-size:12.5px;color:#8f8b7f;line-height:1.5;margin-top:4px\">{{m.why}}<\u002Fdiv>\n          <sc-if value=\"{{m.canDraft}}\" hint-placeholder-val=\"{{ false }}\">\n            <button sc-camel-on-click=\"{{m.onDraft}}\" style=\"margin-top:8px;background:none;border:1px solid rgba(217,174,62,.4);color:#d9ae3e;font-size:11.5px;padding:6px 12px;border-radius:7px;cursor:pointer;font-family:'Instrument Sans'\">Draft meeting from this<\u002Fbutton>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <div style=\"background:#12141a;border:1px solid rgba(236,231,219,.08);border-radius:14px;padding:16px;margin-bottom:12px\">\n    <div style=\"display:flex;justify-content:space-between;align-items:center\">\n      <h3 style=\"font-family:'Instrument Serif',serif;font-weight:400;font-size:19px;margin:0\">Set up a meeting<\u002Fh3>\n      <button sc-camel-on-click=\"{{toggleComposer}}\" style=\"background:none;border:none;color:#d9ae3e;font-size:12px;cursor:pointer;font-family:'Instrument Sans'\">{{composerToggleText}}<\u002Fbutton>\n    <\u002Fdiv>\n    <sc-if value=\"{{composerOpen}}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"margin-top:10px;display:flex;flex-direction:column;gap:9px\">\n        <input type=\"text\" value=\"{{mtgTitle}}\" sc-camel-on-change=\"{{onMtgTitle}}\" placeholder=\"Title — e.g. SOA Tender Review\" style=\"background:#1a1d24;border:1px solid rgba(236,231,219,.12);color:#ece7db;padding:11px 12px;border-radius:8px;font-size:13.5px\">\n        <div style=\"display:flex;gap:9px\">\n          <input type=\"date\" value=\"{{mtgDate}}\" sc-camel-on-change=\"{{onMtgDate}}\" style=\"flex:1.2;background:#1a1d24;border:1px solid rgba(236,231,219,.12);color:#ece7db;padding:10px 12px;border-radius:8px;font-size:13px;min-width:0\">\n          <input type=\"time\" value=\"{{mtgTime}}\" sc-camel-on-change=\"{{onMtgTime}}\" style=\"flex:1;background:#1a1d24;border:1px solid rgba(236,231,219,.12);color:#ece7db;padding:10px 12px;border-radius:8px;font-size:13px;min-width:0\">\n          <input type=\"number\" value=\"{{mtgDur}}\" sc-camel-on-change=\"{{onMtgDur}}\" style=\"flex:.7;background:#1a1d24;border:1px solid rgba(236,231,219,.12);color:#ece7db;padding:10px 12px;border-radius:8px;font-size:13px;min-width:0\" title=\"Minutes\">\n        <\u002Fdiv>\n        <input type=\"text\" value=\"{{mtgGuests}}\" sc-camel-on-change=\"{{onMtgGuests}}\" placeholder=\"Guest emails, comma-separated (optional)\" style=\"background:#1a1d24;border:1px solid rgba(236,231,219,.12);color:#ece7db;padding:11px 12px;border-radius:8px;font-size:13px\">\n        <button sc-camel-on-click=\"{{createMeeting}}\" style=\"background:#d9ae3e;color:#0b0c10;border:none;font-weight:700;font-size:13px;padding:12px;border-radius:8px;cursor:pointer;font-family:'Instrument Sans'\">Create calendar event<\u002Fbutton>\n        <div style=\"font-size:12px;color:#8f8b7f;line-height:1.5\">{{mtgStatus}}<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n  <\u002Fdiv>\n\n  <sc-if value=\"{{hasMeetings}}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"background:#12141a;border:1px solid rgba(236,231,219,.08);border-radius:14px;padding:14px 16px;margin-bottom:12px\">\n      <div style=\"font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#5d5a50;margin-bottom:4px\">Upcoming — created here<\u002Fdiv>\n      <sc-for list=\"{{meetingsList}}\" as=\"mt\" hint-placeholder-count=\"2\">\n        <div style=\"padding:8px 0;border-bottom:1px solid rgba(236,231,219,.06);font-size:13px\"><span style=\"color:#d9ae3e;font-size:11.5px\">{{mt.when}}<\u002Fspan><br>{{mt.title}}<\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<sc-if value=\"{{onCheck}}\" hint-placeholder-val=\"{{ false }}\">\n<div data-screen-label=\"Check-in\">\n  <header style=\"padding:4px 0 14px\">\n    <div style=\"font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:#d9ae3e;font-weight:600\">PSOS · Weekly check-in<\u002Fdiv>\n    <h1 style=\"font-family:'Instrument Serif',serif;font-weight:400;font-size:30px;margin:6px 0 3px\">Ten minutes, once a week<\u002Fh1>\n    <div style=\"font-size:12.5px;color:#8f8b7f\">{{checkinDueText}}<\u002Fdiv>\n  <\u002Fheader>\n\n  <div style=\"background:#12141a;border:1px solid rgba(236,231,219,.08);border-radius:14px;padding:16px;margin-bottom:12px\">\n    <h3 style=\"font-family:'Instrument Serif',serif;font-weight:400;font-size:19px;margin:0 0 4px\">The body<\u002Fh3>\n    <sc-for list=\"{{ciSliders}}\" as=\"c\" hint-placeholder-count=\"4\">\n      <div style=\"padding:9px 0\">\n        <div style=\"display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px\"><span>{{c.label}}<\u002Fspan><span style=\"color:#d9ae3e;font-variant-numeric:tabular-nums\">{{c.valText}}<\u002Fspan><\u002Fdiv>\n        <input type=\"range\" min=\"0\" max=\"10\" step=\"1\" value=\"{{c.val}}\" sc-camel-on-change=\"{{c.onSet}}\" style=\"width:100%\">\n      <\u002Fdiv>\n    <\u002Fsc-for>\n  <\u002Fdiv>\n\n  <div style=\"background:#12141a;border:1px solid rgba(236,231,219,.08);border-radius:14px;padding:16px;margin-bottom:12px\">\n    <h3 style=\"font-family:'Instrument Serif',serif;font-weight:400;font-size:19px;margin:0 0 4px\">The work<\u002Fh3>\n    <div style=\"font-size:12px;color:#5d5a50;margin-bottom:10px\">Tap every arena you meaningfully touched this week.<\u002Fdiv>\n    <div style=\"display:flex;flex-wrap:wrap;gap:8px\">\n      <sc-for list=\"{{ciDomains}}\" as=\"d\" hint-placeholder-count=\"8\">\n        <button sc-camel-on-click=\"{{d.onToggle}}\" style=\"background:{{d.bg}};border:1px solid {{d.border}};color:{{d.fg}};border-radius:18px;padding:8px 14px;font-size:12.5px;cursor:pointer;font-family:'Instrument Sans'\">{{d.label}}<\u002Fbutton>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"background:#12141a;border:1px solid rgba(236,231,219,.08);border-radius:14px;padding:16px;margin-bottom:12px\">\n    <h3 style=\"font-family:'Instrument Serif',serif;font-weight:400;font-size:19px;margin:0 0 8px\">The projects<\u002Fh3>\n    <sc-for list=\"{{ciProjects}}\" as=\"p\" hint-placeholder-count=\"3\">\n      <div style=\"padding:9px 0;border-bottom:1px solid rgba(236,231,219,.06)\">\n        <div style=\"display:flex;justify-content:space-between;gap:10px;font-size:13.5px;align-items:center\">\n          <span style=\"flex:1\">{{p.label}}<\u002Fspan>\n          <input type=\"number\" min=\"0\" max=\"100\" value=\"{{p.pct}}\" sc-camel-on-change=\"{{p.onPct}}\" style=\"width:62px;background:#1a1d24;border:1px solid rgba(236,231,219,.12);color:#ece7db;padding:7px 9px;border-radius:7px;font-size:13px;text-align:right\">\n          <span style=\"color:#5d5a50;font-size:12px\">%<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"height:4px;border-radius:2px;background:rgba(236,231,219,.09);overflow:hidden;margin-top:7px\"><div style=\"height:100%;background:#d9ae3e;width:{{p.pct}}%\"><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-for>\n    <div style=\"display:flex;gap:8px;margin-top:12px\">\n      <input type=\"text\" value=\"{{newProj}}\" sc-camel-on-change=\"{{onNewProj}}\" placeholder=\"New initiative…\" style=\"flex:1;background:#1a1d24;border:1px solid rgba(236,231,219,.12);color:#ece7db;padding:10px 12px;border-radius:8px;font-size:13px;min-width:0\">\n      <button sc-camel-on-click=\"{{addProj}}\" style=\"background:none;border:1px solid rgba(217,174,62,.4);color:#d9ae3e;font-size:12.5px;padding:10px 14px;border-radius:8px;cursor:pointer;font-family:'Instrument Sans'\">Add<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"background:#12141a;border:1px solid rgba(236,231,219,.08);border-radius:14px;padding:16px;margin-bottom:12px\">\n    <h3 style=\"font-family:'Instrument Serif',serif;font-weight:400;font-size:19px;margin:0 0 8px\">The mirror<\u002Fh3>\n    <div style=\"font-size:12.5px;color:#8f8b7f;margin-bottom:6px\">What created the most value this week?<\u002Fdiv>\n    <textarea rows=\"2\" value=\"{{ciQ1}}\" sc-camel-on-change=\"{{onCiQ1}}\" style=\"width:100%;box-sizing:border-box;background:#1a1d24;border:1px solid rgba(236,231,219,.12);color:#ece7db;padding:10px 12px;border-radius:8px;font-size:13px;resize:vertical\"><\u002Ftextarea>\n    <div style=\"font-size:12.5px;color:#8f8b7f;margin:10px 0 6px\">What drained time and gave little back?<\u002Fdiv>\n    <textarea rows=\"2\" value=\"{{ciQ2}}\" sc-camel-on-change=\"{{onCiQ2}}\" style=\"width:100%;box-sizing:border-box;background:#1a1d24;border:1px solid rgba(236,231,219,.12);color:#ece7db;padding:10px 12px;border-radius:8px;font-size:13px;resize:vertical\"><\u002Ftextarea>\n  <\u002Fdiv>\n\n  <button sc-camel-on-click=\"{{saveCheckin}}\" style=\"width:100%;background:#d9ae3e;color:#0b0c10;border:none;font-weight:700;font-size:14px;padding:14px;border-radius:10px;cursor:pointer;font-family:'Instrument Sans';margin-bottom:10px\">Seal the week<\u002Fbutton>\n  <sc-if value=\"{{hasCiSummary}}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"background:linear-gradient(160deg,#141a17,#12141a);border:1px solid rgba(111,174,127,.3);border-radius:14px;padding:14px 16px;margin-bottom:12px;font-size:13px;color:#a8a396;line-height:1.6\">{{ciSummary}}<\u002Fdiv>\n  <\u002Fsc-if>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<sc-if value=\"{{onSettings}}\" hint-placeholder-val=\"{{ false }}\">\n<div data-screen-label=\"Settings\">\n  <header style=\"padding:4px 0 14px;display:flex;justify-content:space-between;align-items:flex-start\">\n    <div>\n      <div style=\"font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:#d9ae3e;font-weight:600\">PSOS · System<\u002Fdiv>\n      <h1 style=\"font-family:'Instrument Serif',serif;font-weight:400;font-size:30px;margin:6px 0 3px\">Settings<\u002Fh1>\n    <\u002Fdiv>\n    <button sc-camel-on-click=\"{{closeSettings}}\" style=\"background:none;border:1px solid rgba(236,231,219,.14);color:#a8a396;border-radius:8px;padding:9px 14px;font-size:12px;cursor:pointer;font-family:'Instrument Sans'\">Done<\u002Fbutton>\n  <\u002Fheader>\n\n  <div style=\"background:#12141a;border:1px solid rgba(236,231,219,.08);border-radius:14px;padding:16px;margin-bottom:12px\">\n    <h3 style=\"font-family:'Instrument Serif',serif;font-weight:400;font-size:19px;margin:0 0 8px\">You<\u002Fh3>\n    <input type=\"text\" value=\"{{setName}}\" sc-camel-on-change=\"{{onSetName}}\" placeholder=\"Your first name\" style=\"width:100%;box-sizing:border-box;background:#1a1d24;border:1px solid rgba(236,231,219,.12);color:#ece7db;padding:11px 12px;border-radius:8px;font-size:13.5px\">\n  <\u002Fdiv>\n\n  <div style=\"background:#12141a;border:1px solid rgba(217,174,62,.25);border-radius:14px;padding:16px;margin-bottom:12px\">\n    <h3 style=\"font-family:'Instrument Serif',serif;font-weight:400;font-size:19px;margin:0 0 4px\">Gmail &amp; Calendar bridge<\u002Fh3>\n    <div style=\"font-size:12.5px;color:#8f8b7f;line-height:1.6;margin-bottom:12px\">Your \"PSOS Bridge\" script already lives in your Google account. Follow the three steps — the diagnostic tells you exactly what's wrong if anything fails.<\u002Fdiv>\n    <div style=\"display:flex;flex-direction:column;gap:10px\">\n      <div style=\"display:flex;gap:10px;align-items:flex-start\"><span style=\"flex-shrink:0;width:22px;height:22px;border-radius:50%;background:rgba(217,174,62,.15);color:#d9ae3e;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center\">1<\u002Fspan><div style=\"font-size:12.5px;color:#a8a396;line-height:1.55\">Open <a href=\"https://script.google.com\" target=\"_blank\" rel=\"noopener\">script.google.com<\u002Fa> → <strong style=\"color:#ece7db\">PSOS Bridge<\u002Fstrong> → Deploy → <strong style=\"color:#ece7db\">Manage deployments<\u002Fstrong> → copy the Web app URL (ends in <span style=\"font-family:monospace\">/exec<\u002Fspan>).<\u002Fdiv><\u002Fdiv>\n      <div style=\"display:flex;gap:10px;align-items:flex-start\"><span style=\"flex-shrink:0;width:22px;height:22px;border-radius:50%;background:rgba(217,174,62,.15);color:#d9ae3e;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center\">2<\u002Fspan><div style=\"font-size:12.5px;color:#a8a396;line-height:1.55\">In the same script, copy the <strong style=\"color:#ece7db\">SECRET<\u002Fstrong> value from line 8 — the phrase between the quotes.<\u002Fdiv><\u002Fdiv>\n      <div style=\"display:flex;gap:10px;align-items:flex-start\"><span style=\"flex-shrink:0;width:22px;height:22px;border-radius:50%;background:rgba(217,174,62,.15);color:#d9ae3e;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center\">3<\u002Fspan><div style=\"font-size:12.5px;color:#a8a396;line-height:1.55\">Paste both below, then run the diagnostic.<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <input type=\"text\" value=\"{{setBridgeUrl}}\" sc-camel-on-change=\"{{onSetBridgeUrl}}\" placeholder=\"https://script.google.com/macros/s/…/exec\" sc-camel-auto-capitalize=\"off\" sc-camel-spell-check=\"false\" style=\"width:100%;box-sizing:border-box;background:#1a1d24;border:1px solid rgba(236,231,219,.12);color:#ece7db;padding:11px 12px;border-radius:8px;font-size:12.5px;margin-top:12px;font-family:monospace\">\n    <input type=\"password\" value=\"{{setBridgeSecret}}\" sc-camel-on-change=\"{{onSetBridgeSecret}}\" placeholder=\"Shared secret (line 8)\" sc-camel-auto-capitalize=\"off\" sc-camel-spell-check=\"false\" style=\"width:100%;box-sizing:border-box;background:#1a1d24;border:1px solid rgba(236,231,219,.12);color:#ece7db;padding:11px 12px;border-radius:8px;font-size:12.5px;margin-top:9px\">\n    <button sc-camel-on-click=\"{{runDiagnostic}}\" style=\"margin-top:12px;width:100%;background:#d9ae3e;color:#0b0c10;border:none;font-weight:700;font-size:13px;padding:12px;border-radius:8px;cursor:pointer;font-family:'Instrument Sans'\">Save &amp; run diagnostic<\u002Fbutton>\n    <sc-if value=\"{{hasDiag}}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"margin-top:12px\">\n        <sc-for list=\"{{diag}}\" as=\"dg\" hint-placeholder-count=\"3\">\n          <div style=\"display:flex;gap:10px;align-items:flex-start;padding:7px 0;border-bottom:1px solid rgba(236,231,219,.06);font-size:12.5px;line-height:1.5\">\n            <span style=\"flex-shrink:0;width:18px;text-align:center;font-weight:700;color:{{dg.color}}\">{{dg.mark}}<\u002Fspan>\n            <span style=\"color:#a8a396\">{{dg.text}}<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n  <\u002Fdiv>\n\n  <div style=\"background:#12141a;border:1px solid rgba(236,231,219,.08);border-radius:14px;padding:16px;margin-bottom:12px\">\n    <div style=\"display:flex;justify-content:space-between;align-items:center;gap:10px\">\n      <div>\n        <div style=\"font-size:14px\">Reminders<\u002Fdiv>\n        <div style=\"font-size:11.5px;color:#5d5a50;margin-top:3px;line-height:1.5\">Nudges for meetings within 24h, deadlines within 48h, and the weekly check-in — while PSOS is open.<\u002Fdiv>\n      <\u002Fdiv>\n      <button sc-camel-on-click=\"{{toggleNotify}}\" style=\"flex-shrink:0;width:46px;height:26px;border-radius:13px;border:none;cursor:pointer;position:relative;background:{{notifyBg}};transition:background .2s\"><span style=\"position:absolute;top:3px;left:{{notifyKnob}}px;width:20px;height:20px;border-radius:50%;background:#ece7db;transition:left .2s\"><\u002Fspan><\u002Fbutton>\n    <\u002Fdiv>\n    <div style=\"font-size:11.5px;color:#8f8b7f;margin-top:8px\">{{notifyStatus}}<\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"background:#12141a;border:1px solid rgba(236,231,219,.08);border-radius:14px;padding:16px;margin-bottom:12px\">\n    <h3 style=\"font-family:'Instrument Serif',serif;font-weight:400;font-size:19px;margin:0 0 6px\">Your data<\u002Fh3>\n    <div style=\"font-size:12px;color:#5d5a50;line-height:1.55;margin-bottom:12px\">Everything lives on this device. Export a backup before switching phones.<\u002Fdiv>\n    <div style=\"display:flex;gap:9px;flex-wrap:wrap\">\n      <button sc-camel-on-click=\"{{exportBackup}}\" style=\"background:#d9ae3e;color:#0b0c10;border:none;font-weight:700;font-size:12.5px;padding:10px 16px;border-radius:8px;cursor:pointer;font-family:'Instrument Sans'\">Export backup<\u002Fbutton>\n      <button sc-camel-on-click=\"{{importClick}}\" style=\"background:none;border:1px solid rgba(236,231,219,.16);color:#a8a396;font-size:12.5px;padding:10px 16px;border-radius:8px;cursor:pointer;font-family:'Instrument Sans'\">Import<\u002Fbutton>\n      <button sc-camel-on-click=\"{{resetApp}}\" style=\"background:none;border:1px solid rgba(201,111,74,.5);color:#c96f4a;font-size:12px;padding:10px 14px;border-radius:8px;cursor:pointer;font-family:'Instrument Sans'\">Reset<\u002Fbutton>\n      <input type=\"file\" accept=\".json\" ref=\"{{importRef}}\" sc-camel-on-change=\"{{importFile}}\" style=\"display:none\">\n    <\u002Fdiv>\n    <div style=\"font-size:11.5px;color:#8f8b7f;margin-top:10px\">{{dataStatus}}<\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"font-size:11px;color:#5d5a50;text-align:center;padding:4px 0 10px;line-height:1.6\">PSOS v3 · {{eventCountText}} · local-first, no server, no tracking.<br>Migrates your v2 data automatically.<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<sc-if value=\"{{askOpen}}\" hint-placeholder-val=\"{{ false }}\">\n  <div style=\"position:fixed;inset:0;background:rgba(6,7,9,.72);backdrop-filter:blur(3px);z-index:60\" sc-camel-on-click=\"{{closeAsk}}\"><\u002Fdiv>\n  <div style=\"position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:#14161c;border:1px solid rgba(236,231,219,.1);border-radius:18px 18px 0 0;z-index:61;padding:18px 16px calc(16px + env(safe-area-inset-bottom));max-height:72vh;display:flex;flex-direction:column;animation:fadeup .25s ease\">\n    <div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:10px\">\n      <div style=\"font-family:'Instrument Serif',serif;font-size:20px\">Ask PSOS<\u002Fdiv>\n      <button sc-camel-on-click=\"{{closeAsk}}\" style=\"background:none;border:none;color:#5d5a50;font-size:18px;cursor:pointer\">✕<\u002Fbutton>\n    <\u002Fdiv>\n    <div style=\"flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:10px;padding:4px 0;min-height:120px\">\n      <sc-for list=\"{{askMsgs}}\" as=\"am\" hint-placeholder-count=\"1\">\n        <div style=\"align-self:{{am.align}};max-width:88%;background:{{am.bg}};color:{{am.fg}};border-radius:12px;padding:10px 13px;font-size:13.5px;line-height:1.55;white-space:pre-wrap\">{{am.text}}<\u002Fdiv>\n      <\u002Fsc-for>\n      <sc-if value=\"{{askThinking}}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"align-self:flex-start;color:#8f8b7f;font-size:12.5px;display:flex;gap:8px;align-items:center\"><div style=\"width:12px;height:12px;border:2px solid rgba(236,231,219,.15);border-top-color:#d9ae3e;border-radius:50%;animation:spin .8s linear infinite\"><\u002Fdiv>Consulting the system…<\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n    <div style=\"display:flex;gap:8px;margin-top:10px\">\n      <input type=\"text\" value=\"{{askInput}}\" sc-camel-on-change=\"{{onAskInput}}\" sc-camel-on-key-down=\"{{onAskKey}}\" placeholder=\"What should I prioritise? Where's the leak?\" style=\"flex:1;background:#1a1d24;border:1px solid rgba(236,231,219,.12);color:#ece7db;padding:12px 13px;border-radius:10px;font-size:13.5px;min-width:0\">\n      <button sc-camel-on-click=\"{{sendAsk}}\" style=\"background:#d9ae3e;color:#0b0c10;border:none;font-weight:700;font-size:13px;padding:12px 16px;border-radius:10px;cursor:pointer;font-family:'Instrument Sans'\">Ask<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsc-if>\n\n<sc-if value=\"{{toastOn}}\" hint-placeholder-val=\"{{ false }}\">\n  <div style=\"position:fixed;left:50%;bottom:120px;transform:translateX(-50%);background:#d9ae3e;color:#0b0c10;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:600;z-index:70;white-space:nowrap;max-width:88vw;overflow:hidden;text-overflow:ellipsis;animation:fadeup .2s ease\">{{toastText}}<\u002Fdiv>\n<\u002Fsc-if>\n\n<button sc-camel-on-click=\"{{openAsk}}\" aria-label=\"Ask PSOS\" style=\"position:fixed;right:max(16px, calc(50% - 199px));bottom:86px;width:52px;height:52px;border-radius:50%;background:linear-gradient(150deg,#e8c565,#d9ae3e);color:#0b0c10;border:none;font-family:'Instrument Serif',serif;font-size:21px;cursor:pointer;box-shadow:0 6px 20px rgba(217,174,62,.35);z-index:50\">✦<\u002Fbutton>\n\n<nav style=\"position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(15,16,21,.92);backdrop-filter:blur(12px);border-top:1px solid rgba(236,231,219,.08);display:flex;justify-content:space-around;padding:9px 4px calc(9px + env(safe-area-inset-bottom));z-index:40\">\n  <sc-for list=\"{{tabs}}\" as=\"tb\" hint-placeholder-count=\"5\">\n    <button sc-camel-on-click=\"{{tb.onGo}}\" style=\"background:none;border:none;color:{{tb.color}};font-family:'Instrument Sans';font-size:10px;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;padding:4px 6px;flex:1;min-width:0\">\n      <svg width=\"19\" height=\"19\" sc-camel-view-box=\"0 0 20 20\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"{{tb.icon}}\"><\u002Fpath><\u002Fsvg>\n      {{tb.label}}\n      <span style=\"width:4px;height:4px;border-radius:50%;background:{{tb.dot}}\"><\u002Fspan>\n    <\u002Fbutton>\n  <\u002Fsc-for>\n<\u002Fnav>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:430,&quot;height&quot;:900},&quot;currency&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;UGX&quot;,&quot;options&quot;:[&quot;UGX&quot;,&quot;USD&quot;,&quot;KES&quot;,&quot;EUR&quot;],&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Money&quot;},&quot;coachTone&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;direct&quot;,&quot;options&quot;:[&quot;direct&quot;,&quot;gentle&quot;],&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Advisor&quot;},&quot;reducedMotion&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Motion&quot;}}\">\nclass Component extends DCLogic {\n  constructor(props){\n    super(props);\n    this.KEY='psos_state_v1';\n    this.STOCKS=[\n      {id:'political',label:'Political capital',group:'Public & Political',target:80,decay:.010,weight:10},\n      {id:'trust',label:'Institutional trust',group:'Public & Political',target:90,decay:.006,weight:9},\n      {id:'sports',label:'Sports capital (Cheza)',group:'Public & Political',target:75,decay:.009,weight:8},\n      {id:'campaign',label:'Campaign readiness',group:'Public & Political',target:70,decay:.008,weight:7},\n      {id:'legal',label:'Legal reputation',group:'Enterprise',target:75,decay:.008,weight:7},\n      {id:'soaEquity',label:'SOA equity',group:'Enterprise',target:80,decay:.010,weight:9},\n      {id:'digitalEquity',label:'Digital ventures',group:'Enterprise',target:75,decay:.011,weight:8},\n      {id:'liquidity',label:'Financial liquidity',group:'Enterprise',target:75,decay:.004,weight:8},\n      {id:'energy',label:'Energy',group:'Personal',target:65,decay:0,weight:0},\n      {id:'learning',label:'Learning capital',group:'Personal',target:90,decay:.004,weight:6},\n      {id:'relational',label:'Relational capital',group:'Personal',target:65,decay:.015,weight:9},\n      {id:'execution',label:'Execution capacity',group:'Personal',target:75,decay:.008,weight:8},\n      {id:'decisionQuality',label:'Decision quality',group:'Personal',target:75,decay:.005,weight:7}\n    ];\n    this.DOMAINS=[\n      {id:'parliament',label:'Parliament',primary:'political',weight:10},\n      {id:'fpicglr',label:'FP-ICGLR',primary:'political',weight:8},\n      {id:'cheza',label:'Cheza / Kwepena',primary:'sports',weight:8},\n      {id:'campaign',label:'PLU campaign',primary:'campaign',weight:6},\n      {id:'legal',label:'Legal practice',primary:'legal',weight:7},\n      {id:'soa',label:'SOA Construction',primary:'soaEquity',weight:9},\n      {id:'nga',label:'NGA',primary:'digitalEquity',weight:7},\n      {id:'istartapp',label:'iStartApp',primary:'digitalEquity',weight:7},\n      {id:'relational',label:'Courtship & family',primary:'relational',weight:8},\n      {id:'learning',label:'Study / CS',primary:'learning',weight:5},\n      {id:'rest',label:'Rest',primary:'energy',weight:9}\n    ];\n    this.QUICK=[\n      {label:'Committee session',domain:'parliament',deltas:{political:2,trust:3,energy:-1}},\n      {label:'Court appearance',domain:'legal',deltas:{legal:2,liquidity:1,energy:-2}},\n      {label:'SOA site / tender',domain:'soa',deltas:{soaEquity:2,liquidity:1,execution:.5,energy:-2}},\n      {label:'Client meeting',domain:'legal',deltas:{legal:1,liquidity:.5,trust:.3,energy:-1}},\n      {label:'Campaign ground work',domain:'campaign',
